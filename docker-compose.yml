version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modelview_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://modelview-redis:6379
    restart: unless-stopped
    networks:
      - modelview_network
    depends_on:
      - modelview-redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: modelview_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - modelview_network
    depends_on:
      - backend

  modelview-redis:
    image: redis:7-alpine
    container_name: modelview_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - modelview_network
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru

networks:
  modelview_network:
    driver: bridge
