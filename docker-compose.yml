version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: modelview_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=false
      - ENVIRONMENT=production
    restart: unless-stopped
    networks:
      - modelview_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: modelview_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    restart: unless-stopped
    networks:
      - modelview_network
    depends_on:
      - backend

networks:
  modelview_network:
    driver: bridge